name: Manual Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            zip_name: TraderMoney_macOS.zip
          - os: windows-latest
            zip_name: TraderMoney_Windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebview flask flask-cors yfinance pandas requests alpaca-trade-api numpy cryptography ib_insync pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconsole --windowed --name "TraderMoney" --collect-all pywebview app.py

      - name: Create zip
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cd dist
            # On Windows runner we can use 7z or Compress-Archive, but powershell is available. We'll use bash with zip if available, else fallback
            zip -r ../${{ matrix.zip_name }} TraderMoney
          else
            cd dist
            zip -r ../${{ matrix.zip_name }} TraderMoney.app
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}
