name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebview flask flask-cors yfinance pandas requests alpaca-trade-api numpy cryptography ib_insync pyinstaller
      - name: Build
        run: pyinstaller --noconsole --windowed --name "TraderMoney" --collect-all pywebview app.py
      - name: Zip
        run: Compress-Archive -Path dist\TraderMoney -DestinationPath TraderMoney_Windows.zip
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TraderMoney_Windows.zip
          path: TraderMoney_Windows.zip
