name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pywebview flask flask-cors yfinance pandas requests alpaca-trade-api numpy cryptography ib_insync pyinstaller pillow
          pip install python-binance pybit okx
      - name: Build app
        run: |
          if (Test-Path icon.ico) { $iconArg = "--icon=icon.ico" } else { $iconArg = "" }
          pyinstaller --noconsole --windowed --name "TraderMoney" --collect-all pywebview $iconArg --hidden-import=binance.client --hidden-import=pybit.unified --hidden-import=okx.Account --hidden-import=okx.Trade --hidden-import=ib_insync app.py
        shell: pwsh
      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path dist\TraderMoney -DestinationPath TraderMoney_Windows.zip
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: TraderMoney_Windows.zip
          token: ${{ secrets.RELEASE_TOKEN }}

  build-macos-apple-silicon:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pywebview flask flask-cors yfinance pandas requests alpaca-trade-api numpy cryptography ib_insync pyinstaller pillow
          pip install python-binance pybit okx
      - name: Build app
        run: |
          ICON=""
          if [ -f icon.icns ]; then ICON="--icon=icon.icns"; fi
          pyinstaller --noconsole --windowed --name "TraderMoney" --collect-all pywebview --target-architecture arm64 --codesign-identity - --osx-bundle-identifier com.tradermoney.app $ICON app.py
      - name: Strip signatures
        run: |
          find dist/TraderMoney.app -type f \( -name "Python" -o -name "*.dylib" -o -name "*.so" \) -exec codesign --remove-signature {} \; 2>/dev/null || true
          codesign --remove-signature dist/TraderMoney.app/Contents/MacOS/TraderMoney 2>/dev/null || true
      - name: Package as tar.gz
        run: cd dist && tar -czf ../TraderMoney_macOS_AppleSilicon.tar.gz TraderMoney.app
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: TraderMoney_macOS_AppleSilicon.tar.gz
          token: ${{ secrets.RELEASE_TOKEN }}

  build-macos-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pywebview flask flask-cors yfinance pandas requests alpaca-trade-api numpy cryptography ib_insync pyinstaller pillow
          pip install python-binance pybit okx
      - name: Build app
        run: |
          ICON=""
          if [ -f icon.icns ]; then ICON="--icon=icon.icns"; fi
          pyinstaller --noconsole --windowed --name "TraderMoney" --collect-all pywebview --target-architecture x86_64 --codesign-identity - --osx-bundle-identifier com.tradermoney.app $ICON app.py
      - name: Strip signatures
        run: |
          find dist/TraderMoney.app -type f \( -name "Python" -o -name "*.dylib" -o -name "*.so" \) -exec codesign --remove-signature {} \; 2>/dev/null || true
          codesign --remove-signature dist/TraderMoney.app/Contents/MacOS/TraderMoney 2>/dev/null || true
      - name: Package as tar.gz
        run: cd dist && tar -czf ../TraderMoney_macOS_Intel.tar.gz TraderMoney.app
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: TraderMoney_macOS_Intel.tar.gz
          token: ${{ secrets.RELEASE_TOKEN }}
