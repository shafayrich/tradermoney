name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            artifact_name: TraderMoney_macOS.zip
          - os: windows-latest
            artifact_name: TraderMoney_Windows.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pywebview flask flask-cors yfinance pandas requests alpaca-trade-api numpy cryptography ib_insync pyinstaller
          pip install python-binance pybit okx

      - name: Build app
        run: |
          pyinstaller --noconsole --windowed --name "TraderMoney" --collect-all pywebview app.py

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist && zip -r ../${{ matrix.artifact_name }} TraderMoney.app

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\TraderMoney -DestinationPath ${{ matrix.artifact_name }}

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
